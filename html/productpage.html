<script>
      // Gespeicherte ID holen
  const productId = parseInt(localStorage.getItem("selectedProductId"));
  const product = products.find(p => p.id === productId);

  if (!product) {
    document.body.innerHTML = "<h1>Produkt nicht gefunden</h1>";
  } else {
    // Seitentitel setzen
    document.title = "VOID SUPPLY - " + product.name;

    // Inhalte ersetzen
    document.getElementById("product-name").textContent = product.name;
    document.getElementById("product-price").textContent = product.price + "€";
    document.getElementById("product-description").textContent = product.description;
    document.getElementById("product-instock").textContent =
      product.inStock ? "Verfügbar" : "Ausverkauft";

    // Bilder setzen
    const images = document.querySelectorAll(".product-images img");
    if(images[0]) images[0].src = "../product/" + product.image_1;
    if(images[1]) images[1].src = "../product/" + product.image_2;

    // Sale-Icon
    const saleIcon = document.querySelector(".product-sale");
    if(saleIcon){
      saleIcon.style.display = product.rabatt ? "block" : "none";
    }

    // Farben dynamisch füllen
    const colorSelect = document.getElementById("color");
    if(colorSelect && product.colors){
      colorSelect.innerHTML = product.colors.map(c => `<option value="${c}">${c}</option>`).join("");
    }

    // Größen dynamisch füllen (optional)
    const sizeSelect = document.getElementById("size");
    if(sizeSelect){
      if(product.sizes && product.sizes.length > 0){
        sizeSelect.style.display = "inline";
        sizeSelect.innerHTML = `<option value="">Größe wählen</option>` +
                               product.sizes.map(s => `<option value="${s}">${s}</option>`).join("");
      } else {
        // Keine Größen vorhanden → ausblenden
        sizeSelect.style.display = "none";
      }
    }
  }

</script>
<script>
const cookiePopup = document.getElementById("cookie-popup");
const acceptBtn = document.getElementById("accept-cookies");
const declineBtn = document.getElementById("decline-cookies");

// Prüfen ob schon akzeptiert
if(localStorage.getItem("cookiesAccepted")){
  cookiePopup.style.display = "none";
}

// Accept
acceptBtn.addEventListener("click", () => {
  localStorage.setItem("cookiesAccepted", "true");
  cookiePopup.style.display = "none";
});

// Decline
declineBtn.addEventListener("click", () => {
  cookiePopup.style.display = "none";
});

function scrollToSection() {
  document.getElementById("move-down").scrollIntoView({
    behavior: "smooth"
  });
}

</script>
